<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ファスナ在庫管理</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F4F6F9;
    --surface: #ffffff;
    --border: #E2E6ED;
    --text: #0F1729;
    --muted: #2E3D55;
    --accent: #1B4FD8;
    --accent-light: #EEF3FF;
    --danger: #D92D20;
    --danger-light: #FEF3F2;
    --warning: #B54708;
    --warning-light: #FFFAEB;
    --success: #067647;
    --success-light: #ECFDF3;
    --radius: 8px;
    --radius-lg: 12px;
    --header-h: 60px;
    --sidebar-w: 220px;
  }
  body { font-family: 'Hiragino Sans', 'Yu Gothic UI', 'Meiryo UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; min-height: 100vh; display: flex; flex-direction: column; }

  /* ===== HEADER ===== */
  header { height: var(--header-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 28px; gap: 16px; position: sticky; top: 0; z-index: 100; flex-shrink: 0; }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.4px; margin-right: auto; }
  .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .logo-icon svg { color: #fff; }
  .header-btn { height: 40px; padding: 0 18px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; transition: background 0.15s; font-family: inherit; }
  .header-btn:hover { background: var(--bg); }
  .header-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .header-btn.primary:hover { background: #1640b8; }

  /* ===== LAYOUT ===== */
  .layout { display: flex; flex: 1; min-height: 0; }

  /* ===== SIDEBAR ===== */
  aside { width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px 12px; gap: 4px; flex-shrink: 0; }
  .nav-label { font-size: 11px; font-weight: 600; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; padding: 0 10px; margin: 12px 0 4px; }
  .nav-label:first-child { margin-top: 0; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: var(--radius); font-size: 14px; color: var(--muted); cursor: pointer; border: none; background: none; font-family: inherit; width: 100%; text-align: left; transition: all 0.12s; }
  .nav-item:hover { background: var(--bg); color: var(--text); }
  .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
  .nav-item svg { flex-shrink: 0; width: 18px; height: 18px; }
  .nav-badge { margin-left: auto; font-size: 11px; font-weight: 700; padding: 1px 7px; border-radius: 999px; }
  .nav-badge.danger { background: var(--danger-light); color: var(--danger); }
  .nav-badge.warning { background: var(--warning-light); color: var(--warning); }

  /* ===== MAIN ===== */
  main { flex: 1; overflow-y: auto; padding: 20px 20px; display: flex; flex-direction: column; gap: 0; }

  /* ===== STATS ===== */
  .stats { display: grid; grid-template-columns: repeat(2, minmax(0, 200px)); gap: 12px; margin-bottom: 20px; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--muted); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-value.danger { color: var(--danger); }
  .stat-value.warning { color: var(--warning); }
  .stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* ===== TOOLBAR ===== */
  .toolbar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .search-wrap { position: relative; flex: 1; max-width: 260px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); width: 16px; height: 16px; pointer-events: none; }
  input[type="text"], input[type="number"], input[type="date"], select { height: 34px; border: 1px solid var(--border); border-radius: var(--radius); padding: 0 10px; font-size: 13px; color: var(--text); background: var(--surface); outline: none; width: 100%; font-family: inherit; }
  input[type="date"] { cursor: pointer; }
  .search-wrap input { padding-left: 34px; }
  input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(27,79,216,0.1); }
  .filter-select { width: auto; min-width: 110px; height: 34px; font-size: 12px; }

  /* ===== BUTTONS ===== */
  .btn { height: 30px; padding: 0 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 12px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; transition: background 0.12s; font-family: inherit; }
  .btn:hover { background: var(--bg); }
  .btn-sm { height: 28px; padding: 0 10px; font-size: 11px; }
  .btn-danger-sm { height: 28px; padding: 0 10px; font-size: 11px; background: var(--danger-light); color: var(--danger); border: 1px solid #FEE4E2; border-radius: var(--radius); cursor: pointer; font-family: inherit; transition: background 0.12s; }
  .btn-danger-sm:hover { background: #FEE4E2; }

  /* ===== TABLE ===== */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; min-width: 780px; }
  thead th { background: var(--bg); padding: 8px 10px; text-align: left; font-size: 11px; font-weight: 600; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; letter-spacing: 0.02em; }
  thead th.num { text-align: right; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:nth-child(even) { background: #D6E4F5; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #BDCFE8; }
  td { padding: 8px 10px; font-size: 12px; vertical-align: middle; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.actions { white-space: nowrap; display: flex; gap: 5px; justify-content: flex-end; align-items: center; }

  /* 品番・品名 固定列 */
  .col-code { position: sticky; left: 0; z-index: 2; background: var(--surface); min-width: 90px; box-shadow: 2px 0 4px rgba(0,0,0,0.06); }
  .col-name { position: sticky; left: 90px; z-index: 2; background: var(--surface); min-width: 140px; box-shadow: 2px 0 6px rgba(0,0,0,0.08); }
  thead .col-code, thead .col-name { z-index: 3; background: var(--bg); }
  tbody tr:nth-child(even) .col-code,
  tbody tr:nth-child(even) .col-name { background: #D6E4F5; }
  tbody tr:hover .col-code,
  tbody tr:hover .col-name { background: #BDCFE8; }

  /* ===== BADGES ===== */
  .badge { display: inline-flex; align-items: center; gap: 3px; padding: 2px 6px; border-radius: 999px; font-size: 10px; font-weight: 600; white-space: nowrap; }
  .badge-danger { background: var(--danger-light); color: var(--danger); }
  .badge-warning { background: var(--warning-light); color: var(--warning); }
  .badge-ok { background: var(--success-light); color: var(--success); }

  /* ===== STOCK BAR ===== */
  .stock-cell { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
  .stock-bar { width: 50px; height: 5px; background: var(--border); border-radius: 999px; overflow: hidden; flex-shrink: 0; }
  .stock-bar-fill { height: 100%; border-radius: 999px; }

  /* ===== ORDER TOGGLE ===== */
  .order-toggle { height: 26px; padding: 0 8px; font-size: 11px; font-weight: 500; border-radius: var(--radius); border: 1px solid; cursor: pointer; font-family: inherit; transition: all 0.12s; white-space: nowrap; }
  .order-toggle.unordered { background: var(--bg); color: var(--muted); border-color: var(--border); }
  .order-toggle.unordered:hover { background: #E8EBF0; color: var(--text); }
  .order-toggle.ordered { background: var(--accent-light); color: var(--accent); border-color: #C7D9FF; }
  .order-toggle.ordered:hover { background: #DDEAFF; }
  .arrival-input { height: 26px; font-size: 11px; padding: 0 6px; width: 112px; min-width: 0; }
  .arrival-input:disabled { opacity: 0.38; cursor: not-allowed; }

  /* ===== MODAL ===== */
  .overlay { display: none; position: fixed; inset: 0; background: rgba(15,23,41,0.35); z-index: 200; align-items: center; justify-content: center; }
  .overlay.active { display: flex; }
  .modal { background: var(--surface); border-radius: var(--radius-lg); padding: 28px; width: 480px; max-width: calc(100vw - 40px); border: 1px solid var(--border); }
  .modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 22px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: 0.02em; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
  .modal-btn { height: 40px; padding: 0 20px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
  .modal-btn:hover { background: var(--bg); }
  .modal-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .modal-btn.primary:hover { background: #1640b8; }
  .radio-group { display: flex; gap: 20px; }
  .radio-group label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: var(--text); font-weight: 400; }
  .radio-group input[type="radio"] { width: 16px; height: 16px; accent-color: var(--accent); }

  .cat-header-row td { border-top: 8px solid var(--bg) !important; }
  .empty { text-align: center; padding: 56px 0; color: var(--muted); font-size: 14px; }
  .empty svg { width: 40px; height: 40px; color: var(--border); margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }

  /* ===== SECTION HEADER ===== */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .section-title { font-size: 16px; font-weight: 700; }
  .section-count { font-size: 13px; color: var(--muted); margin-left: 8px; font-weight: 400; }

  /* ===== iPad / PC breakpoints ===== */
  @media (max-width: 900px) {
    :root { --sidebar-w: 60px; }
    .nav-item span, .nav-label, .nav-badge { display: none; }
    .nav-item { justify-content: center; padding: 12px; }
    aside { padding: 12px 8px; }
    main { padding: 20px 16px; }
    .stats { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 680px) {
    .stats { grid-template-columns: 1fr 1fr; }
    .header-btn span { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/><line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/></svg>
    </div>
    <span>ファスナ在庫管理</span>
  </div>
  <button class="header-btn primary" onclick="openInOut()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 16V4m0 0L3 8m4-4l4 4M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
    <span>入出庫を入力</span>
  </button>
  <button class="header-btn" onclick="openAddItem()">
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
    <span>品目追加</span>
  </button>
</header>

<div class="layout">
  <aside>
    <div class="nav-label">メニュー</div>
    <button class="nav-item active" onclick="switchView('inventory', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>在庫一覧</span>
      <span class="nav-badge danger" id="nav-danger">0</span>
    </button>
    <button class="nav-item" onclick="switchView('order', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="m9 12 2 2 4-4"/></svg>
      <span>発注管理</span>
      <span class="nav-badge warning" id="nav-order">0</span>
    </button>
    <button class="nav-item" onclick="switchView('log', this)">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span>入出庫履歴</span>
    </button>
  </aside>

  <main>
    <!-- 在庫一覧 -->
    <div id="view-inventory">
      <div class="stats">
        <div class="stat"><div class="stat-label">在庫切れ</div><div class="stat-value danger" id="stat-danger">0</div><div class="stat-sub">要発注</div></div>
        <div class="stat"><div class="stat-label">在庫切れ間近</div><div class="stat-value warning" id="stat-warning">0</div><div class="stat-sub">要注意</div></div>
      </div>
      <div class="section-header">
        <div><span class="section-title">在庫一覧</span><span class="section-count" id="inv-count"></span></div>
        <div style="display:flex;gap:10px;align-items:center;">
          <div class="search-wrap" style="max-width:280px;">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="search" placeholder="品名・メーカーで検索..." oninput="renderInventory()">
          </div>
          <select class="filter-select" id="filter-status" onchange="renderInventory()">
            <option value="">状態：すべて</option>
            <option value="danger">在庫切れ</option>
            <option value="warning">要注意</option>
            <option value="ok">正常</option>
          </select>
          <select class="filter-select" id="filter-cat" onchange="renderInventory()">
            <option value="">カテゴリー：全て</option>
            <option value="thru">スペーサー 貫通</option>
            <option value="nothru">スペーサー 非貫通</option>
            <option value="stud">スタッド</option>
            <option value="nut">ナット</option>
            <option value="other">その他</option>
          </select>
          <select class="filter-select" id="filter-maker" onchange="renderInventory()">
            <option value="">メーカー：全て</option>
          </select>
        </div>
      </div>
      <div class="table-wrap">
        <div class="table-scroll">
          <table>
          <thead style="display:none">
              <tr>
                <th style="min-width:180px">品名</th>
                <th style="min-width:90px">メーカー</th>
                <th class="num" style="min-width:100px">在庫数（個）</th>
                <th class="num" style="min-width:70px">最低在庫数</th>
                <th style="min-width:95px">最終入出庫日</th>
                <th style="min-width:90px">発注状況</th>
                <th style="min-width:115px">入荷予定日</th>
                <th style="min-width:65px">状態</th>
                <th style="min-width:95px"></th>
              </tr>
            </thead>
            <tbody id="inventory-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 発注管理 -->
    <div id="view-order" style="display:none">
      <div class="section-header">
        <div><span class="section-title">発注管理</span><span class="section-count" id="order-count"></span></div>
        <select class="filter-select" id="order-filter" onchange="renderOrder()">
          <option value="">すべて表示</option>
          <option value="unordered">未発注のみ</option>
          <option value="ordered">発注済みのみ</option>
        </select>
      </div>
      <div class="table-wrap">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th style="min-width:220px">品名</th>
                <th style="min-width:110px">メーカー</th>
                <th class="num" style="min-width:110px">在庫数（個）</th>
                <th class="num" style="min-width:90px">最低在庫数</th>
                <th style="min-width:110px">発注状況</th>
                <th style="min-width:140px">入荷予定日</th>
                <th style="min-width:80px">状態</th>
              </tr>
            </thead>
            <tbody id="order-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 入出庫履歴 -->
    <div id="view-log" style="display:none">
      <div class="section-header">
        <div><span class="section-title">入出庫履歴</span><span class="section-count" id="log-count"></span></div>
        <div style="display:flex;gap:10px;">
          <select class="filter-select" id="log-filter-item" onchange="renderLog()"><option value="">品目：全て</option></select>
          <select class="filter-select" id="log-filter-type" onchange="renderLog()">
            <option value="">種別：全て</option>
            <option value="入庫">入庫</option>
            <option value="出庫">出庫</option>
          </select>
          <select class="filter-select" id="log-filter-person" onchange="renderLog()"><option value="">担当者：全て</option></select>
        </div>
      </div>
      <div class="table-wrap">
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th style="min-width:150px">日時</th>
                <th style="min-width:220px">品名</th>
                <th style="min-width:70px">種別</th>
                <th class="num" style="min-width:80px">数量</th>
                <th style="min-width:100px">担当者</th>
                <th style="min-width:140px">備考</th>
              </tr>
            </thead>
            <tbody id="log-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- 品目追加/編集モーダル -->
<div class="overlay" id="modal-item">
  <div class="modal">
    <h2 id="modal-item-title">品目を追加</h2>
    <div class="field-row">
      <div class="field">
        <label>品番</label>
        <input type="text" id="f-code" placeholder="例：DFB-M3-8SC">
      </div>
      <div class="field">
        <label>品名</label>
        <input type="text" id="f-name" placeholder="例：スペーサー 非貫通">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>メーカー</label>
        <input type="text" id="f-maker" placeholder="例：セルジャパン">
      </div>
      <div class="field">
        <label>最低在庫数（発注点）</label>
        <input type="number" id="f-min" min="0" placeholder="500">
      </div>
    </div>
    <div class="field">
      <label>初期在庫数</label>
      <input type="number" id="f-stock" min="0" placeholder="0">
    </div>
    <div class="field-row">
      <div class="field">
        <label>サイズ(mm)</label>
        <input type="text" id="f-size" placeholder="例：M3×8">
      </div>
      <div class="field">
        <label>板金側下穴径 (mm)</label>
        <input type="text" id="f-hole" placeholder="例：3.3">
      </div>
    </div>
    <div class="field">
      <label>備考</label>
      <input type="text" id="f-note" placeholder="例：適用板厚 1.0〜3.2mm">
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal('modal-item')">キャンセル</button>
      <button class="modal-btn primary" onclick="saveItem()">保存する</button>
    </div>
  </div>
</div>

<!-- 入出庫モーダル -->
<div class="overlay" id="modal-inout">
  <div class="modal">
    <h2>入出庫を入力</h2>
    <div class="field">
      <label>品名</label>
      <select id="io-item" style="width:100%"></select>
    </div>
    <div class="field">
      <label>種別</label>
      <div class="radio-group">
        <label><input type="radio" name="io-type" value="入庫" checked> 入庫</label>
        <label><input type="radio" name="io-type" value="出庫"> 出庫</label>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>数量</label>
        <input type="number" id="io-qty" min="1" placeholder="100">
      </div>
      <div class="field">
        <label>担当者名</label>
        <input type="text" id="io-person" placeholder="氏名">
      </div>
    </div>
    <div class="field">
      <label>備考（任意）</label>
      <input type="text" id="io-note" placeholder="">
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeModal('modal-inout')">キャンセル</button>

let items = [], logs = [], editingId = null, nextId = 100;

function load() {
  try {
    const d = localStorage.getItem(STORAGE_KEY);
    items = d ? JSON.parse(d) : JSON.parse(JSON.stringify(DEFAULT_ITEMS));
    const l = localStorage.getItem(LOG_KEY);
    logs = l ? JSON.parse(l) : [];
    nextId = items.length ? Math.max(...items.map(i => i.id)) + 1 : 100;
  } catch(e) { items = JSON.parse(JSON.stringify(DEFAULT_ITEMS)); logs = []; }
}

function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); localStorage.setItem(LOG_KEY, JSON.stringify(logs)); } catch(e) {}
}

function status(item) {
  if (!item.minStock) return 'ok';
  if (item.stock <= 0 || item.stock < item.minStock) return 'danger';
  if (item.stock < item.minStock * 1.3) return 'warning';
  return 'ok';
}

function statusBadge(item) {
  const s = status(item);
  if (s === 'danger') return '<span class="badge badge-danger">在庫切れ</span>';
  if (s === 'warning') return '<span class="badge badge-warning">要注意</span>';
  return '<span class="badge badge-ok">正常</span>';
}

function barColor(s) { return s==='danger'?'#D92D20':s==='warning'?'#F79009':'#17B26A'; }
function barWidth(item) { if (!item.minStock) return 100; return Math.min(100, Math.round(item.stock/(item.minStock*1.5)*100)); }

function lastLogOf(name) { return [...logs].reverse().find(l => l.name === name); }

function orderToggleHTML(item) {
  const cls = item.ordered ? 'ordered' : 'unordered';
  const label = item.ordered ? '✓ 発注済み' : '未発注';
  return `<button class="order-toggle ${cls}" onclick="toggleOrder(${item.id})">${label}</button>`;
}

function arrivalHTML(item) {
  const dis = item.ordered ? '' : 'disabled';
  const val = item.arrivalDate || '';
  return `<input type="date" class="arrival-input" value="${val}" ${dis} onchange="saveArrival(${item.id},this.value)">`;
}

function updateStats() {
  const nd = items.filter(i => status(i)==='danger').length;
  const nw = items.filter(i => status(i)==='warning').length;
  const no = items.filter(i => i.ordered).length;
  document.getElementById('stat-danger').textContent = nd;
  document.getElementById('stat-warning').textContent = nw;
  document.getElementById('nav-danger').textContent = nd;
  document.getElementById('nav-order').textContent = no;
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const sf = document.getElementById('filter-status').value;
  const mf = document.getElementById('filter-maker').value;
  const cf = document.getElementById('filter-cat').value;
  return items.filter(item => {
    if (q && !item.name.toLowerCase().includes(q) && !(item.code||'').toLowerCase().includes(q) && !item.maker.toLowerCase().includes(q)) return false;
    if (sf && status(item) !== sf) return false;
    if (mf && item.maker !== mf) return false;
    if (cf && getCategory(item) !== cf) return false;
    return true;
  });
}

const CAT_COLORS = {
  thru:   { bg: '#EEF3FF', color: '#1B4FD8' },
  nothru: { bg: '#F0F4FF', color: '#067647' },
  stud:   { bg: '#F0F4FF', color: '#1B4FD8' },
  nut:    { bg: '#F0F4FF', color: '#1B4FD8' },
  other:  { bg: '#F4F6F9', color: '#5E6E8A' },
};

const CATEGORIES = [
  { key: 'thru',    label: 'スペーサー 貫通',  test: item => item.name.includes('スペーサ') && !item.name.includes('非貫通') },
  { key: 'nothru',  label: 'スペーサー 非貫通', test: item => item.name.includes('スペーサ') && item.name.includes('非貫通') },
  { key: 'stud',    label: 'スタッド',          test: item => item.name.includes('スタッド') },
  { key: 'nut',     label: 'ナット',            test: item => item.name.includes('ナット') },
  { key: 'other',   label: 'その他',            test: () => true },
];

function getCategory(item) {
  for (const cat of CATEGORIES) { if (cat.test(item)) return cat.key; }
  return 'other';
}

function itemRowHTML(item) {
  const ll = lastLogOf(item.name);
  const lastDate = ll ? ll.ts.slice(0,10) : '—';
  const lastTypeStr = ll ? `<span style="font-size:11px;color:var(--muted);margin-left:4px">${ll.type}</span>` : '';
  const st = status(item);
  return `<tr>
    <td class="col-code" style="font-weight:600;color:var(--muted);font-size:12px;white-space:nowrap">${item.code||'—'}</td>
    <td class="col-name" style="font-weight:500">${item.name}</td>
    <td style="font-size:12px;color:var(--muted)">${item.size||'—'}</td>
    <td>${statusBadge(item)}</td>
    <td class="num">
      <div class="stock-cell">
        <span style="font-weight:700;font-size:17px">${item.stock.toLocaleString()}</span>
        <div class="stock-bar"><div class="stock-bar-fill" style="width:${barWidth(item)}%;background:${barColor(st)}"></div></div>
      </div>
    </td>
    <td class="num" style="color:var(--muted)">${item.minStock.toLocaleString()}</td>
    <td style="font-size:12px;color:var(--muted)">${lastDate}${lastTypeStr}</td>
    <td>${orderToggleHTML(item)}</td>
    <td>${arrivalHTML(item)}</td>
    <td style="font-size:12px;color:var(--muted)">${item.itemNote||''}</td>
    <td style="color:var(--muted);font-size:12px">${item.maker}</td>
    <td style="font-size:12px;color:var(--muted)">${item.hole||'—'}</td>
    <td class="actions">
      <button class="btn btn-sm" onclick="openEditItem(${item.id})">編集</button>
      <button class="btn-danger-sm" onclick="deleteItem(${item.id})">削除</button>
    </td>
  </tr>`;
}

function categoryHeaderHTML(key, label, count, dangerCount, warningCount) {
  const alerts = [];
  if (dangerCount) alerts.push(`<span style="font-size:11px;font-weight:600;background:var(--danger-light);color:var(--danger);padding:2px 8px;border-radius:999px">${dangerCount}件 在庫切れ</span>`);
  if (warningCount) alerts.push(`<span style="font-size:11px;font-weight:600;background:var(--warning-light);color:var(--warning);padding:2px 8px;border-radius:999px">${warningCount}件 要注意</span>`);
  const c = CAT_COLORS[key] || CAT_COLORS.other;
  const icon = CAT_ICONS[key] || CAT_ICONS.other;
  return `<tr class="cat-header-row">
    <td colspan="13" style="padding:16px 16px 10px;background:var(--bg);border-bottom:none;position:sticky;left:0;"">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:80px;height:80px;border-radius:12px;background:${c.bg};color:${c.color};display:flex;align-items:center;justify-content:center;flex-shrink:0;">${icon}</div>
        <span style="font-size:20px;font-weight:700;color:var(--text)">${label}</span>
        <span style="font-size:12px;color:var(--muted)">${count}品目</span>
        ${alerts.join('')}
      </div>
    </td>
  </tr>
  <tr style="background:var(--bg);border-bottom:2px solid var(--border);">
    <th class="col-code" style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:left;min-width:90px">品番</th>
    <th class="col-name" style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:left;min-width:140px">品名</th>
    <th style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:left;min-width:75px">サイズ(mm)</th>
    <th style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:left;min-width:55px">状態</th>
    <th style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:right;min-width:100px">在庫数（個）</th>
    <th style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:right;min-width:70px">最低在庫数</th>
    <th style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:left;min-width:95px">最終入出庫日</th>
    <th style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:left;min-width:90px">発注状況</th>
    <th style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:left;min-width:115px">入荷予定日</th>
    <th style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:left;min-width:110px">備考</th>
    <th style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:left;min-width:90px">メーカー</th>
    <th style="padding:7px 10px;font-size:11px;font-weight:600;color:var(--muted);text-align:left;min-width:100px">板金側下穴径</th>
    <th style="padding:7px 10px;min-width:95px"></th>
  </tr>`;
}

function renderInventory() {
  updateStats();
  updateMakerFilter();
  const filtered = getFiltered();
  document.getElementById('inv-count').textContent = `（${filtered.length}件）`;
  const tbody = document.getElementById('inventory-body');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="12" class="empty"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>該当する品目がありません</td></tr>`;
    return;
  }
  let html = '';
  for (const cat of CATEGORIES) {
    const group = filtered.filter(item => getCategory(item) === cat.key);
    if (!group.length) continue;
    const dc = group.filter(i => status(i)==='danger').length;
    const wc = group.filter(i => status(i)==='warning').length;
    html += categoryHeaderHTML(cat.key, cat.label, group.length, dc, wc);
    html += group.map(itemRowHTML).join('');
  }
  tbody.innerHTML = html;
}

function updateMakerFilter() {
  const sel = document.getElementById('filter-maker');
  const cur = sel.value;
  const makers = [...new Set(items.map(i=>i.maker))].sort();
  sel.innerHTML = '<option value="">メーカー：全て</option>' + makers.map(m=>`<option value="${m}"${m===cur?' selected':''}>${m}</option>`).join('');
}

function renderOrder() {
  const f = document.getElementById('order-filter').value;
  let list = items.filter(i => status(i)==='danger' || status(i)==='warning' || i.ordered);
  if (f==='unordered') list = list.filter(i=>!i.ordered);
  if (f==='ordered') list = list.filter(i=>i.ordered);
  document.getElementById('order-count').textContent = `（${list.length}件）`;
  const tbody = document.getElementById('order-body');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="m9 12 2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>対象の品目はありません</td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(item => {
    const st = status(item);
    return `<tr>
      <td style="font-weight:500">${item.name}</td>
      <td style="color:var(--muted)">${item.maker}</td>
      <td class="num" style="font-weight:700;font-size:17px">${item.stock.toLocaleString()}</td>
      <td class="num" style="color:var(--muted)">${item.minStock.toLocaleString()}</td>
      <td>${orderToggleHTML(item)}</td>
      <td>${arrivalHTML(item)}</td>
      <td>${statusBadge(item)}</td>
    </tr>`;
  }).join('');
}

function renderLog() {
  const itemF = document.getElementById('log-filter-item').value;
  const typeF = document.getElementById('log-filter-type').value;
  const personF = document.getElementById('log-filter-person').value;
  const filtered = [...logs].reverse().filter(l => {
    if (itemF && l.name!==itemF) return false;
    if (typeF && l.type!==typeF) return false;
    if (personF && l.person!==personF) return false;
    return true;
  });
  document.getElementById('log-count').textContent = `（${filtered.length}件）`;
  const tbody = document.getElementById('log-body');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty"><svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>履歴がありません</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(l=>`<tr>
    <td style="color:var(--muted);font-size:12px">${l.ts}</td>
    <td>${l.name}</td>
    <td><span class="badge ${l.type==='入庫'?'badge-ok':'badge-warning'}">${l.type}</span></td>
    <td class="num" style="font-weight:500">${l.qty.toLocaleString()}</td>
    <td>${l.person}</td>
    <td style="color:var(--muted);font-size:13px">${l.note||''}</td>
  </tr>`).join('');
  updateLogFilters();
}

function updateLogFilters() {
  const iSel = document.getElementById('log-filter-item');
  const pSel = document.getElementById('log-filter-person');
  const iCur = iSel.value, pCur = pSel.value;
  iSel.innerHTML = '<option value="">品目：全て</option>' + [...new Set(items.map(i=>i.name))].sort().map(n=>`<option value="${n}"${n===iCur?' selected':''}>${n}</option>`).join('');
  pSel.innerHTML = '<option value="">担当者：全て</option>' + [...new Set(logs.map(l=>l.person).filter(Boolean))].sort().map(p=>`<option value="${p}"${p===pCur?' selected':''}>${p}</option>`).join('');
}

let currentView = 'inventory';
function switchView(view, btn) {
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['inventory','order','log'].forEach(v => { document.getElementById('view-'+v).style.display = v===view?'':'none'; });
  currentView = view;
  if (view==='inventory') renderInventory();
  if (view==='order') renderOrder();
  if (view==='log') renderLog();
}

function openAddItem() {
  editingId = null;
  document.getElementById('modal-item-title').textContent = '品目を追加';
  ['f-code','f-name','f-maker','f-min','f-stock','f-size','f-hole','f-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('modal-item').classList.add('active');
}
function openEditItem(id) {
  const item = items.find(i=>i.id===id); if(!item) return;
  editingId = id;
  document.getElementById('modal-item-title').textContent = '品目を編集';
  document.getElementById('f-code').value = item.code||'';
  document.getElementById('f-name').value = item.name;
  document.getElementById('f-maker').value = item.maker;
  document.getElementById('f-min').value = item.minStock;
  document.getElementById('f-stock').value = item.stock;
  document.getElementById('f-size').value = item.size||'';
  document.getElementById('f-hole').value = item.hole||'';
  document.getElementById('f-note').value = item.itemNote||'';
  document.getElementById('modal-item').classList.add('active');
}
function saveItem() {
  const code = document.getElementById('f-code').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const maker = document.getElementById('f-maker').value.trim();
  const minStock = parseInt(document.getElementById('f-min').value)||0;
  const stock = parseInt(document.getElementById('f-stock').value)||0;
  const size = document.getElementById('f-size').value.trim();
  const hole = document.getElementById('f-hole').value.trim();
  const itemNote = document.getElementById('f-note').value.trim();
  if (!name) { alert('品名を入力してください'); return; }
  if (!confirm(editingId ? '内容を更新しますか？' : 'この品目を追加しますか？')) return;
  if (editingId) {
    const item=items.find(i=>i.id===editingId);
    item.code=code; item.name=name; item.maker=maker; item.minStock=minStock; item.stock=stock;
    item.size=size; item.hole=hole; item.itemNote=itemNote;
  } else {
    items.push({id:nextId++, code, name, maker, stock, minStock, ordered:false, arrivalDate:'', size, hole, itemNote});
  }
  save(); closeModal('modal-item');
  if (currentView==='inventory') renderInventory();
  else if (currentView==='order') renderOrder();
}
function deleteItem(id) {
  const item=items.find(i=>i.id===id); if(!item) return;
  if (!confirm(`「${item.name}」を削除してもよいですか？`)) return;
  items=items.filter(i=>i.id!==id); save(); renderInventory();
}
function toggleOrder(id) {
  const item=items.find(i=>i.id===id); if(!item) return;
  const msg = item.ordered
    ? `「${item.code||item.name}」を未発注に戻しますか？\n（入荷予定日もクリアされます）`
    : `「${item.code||item.name}」を発注済みにしますか？`;
  if (!confirm(msg)) return;
  item.ordered=!item.ordered; if(!item.ordered) item.arrivalDate='';
  save();
  if (currentView==='inventory') renderInventory();
  else if (currentView==='order') renderOrder();
}
function saveArrival(id,val) {
  const item=items.find(i=>i.id===id); if(!item) return;
  item.arrivalDate=val; save();
}
function openInOut() {
  const sel=document.getElementById('io-item');
  sel.innerHTML=items.map(i=>`<option value="${i.id}">${i.code ? i.code+' '+i.name : i.name}</option>`).join('');
  ['io-qty','io-person','io-note'].forEach(id=>document.getElementById(id).value='');
  document.querySelector('input[name="io-type"][value="入庫"]').checked=true;
  document.getElementById('modal-inout').classList.add('active');
}
function saveInOut() {
  const itemId=parseInt(document.getElementById('io-item').value);
  const type=document.querySelector('input[name="io-type"]:checked').value;
  const qty=parseInt(document.getElementById('io-qty').value);
  const person=document.getElementById('io-person').value.trim();
  const note=document.getElementById('io-note').value.trim();
  if (!qty||qty<=0) { alert('数量を入力してください'); return; }
  if (!person) { alert('担当者名を入力してください'); return; }
  const item=items.find(i=>i.id===itemId); if(!item) return;
  if (type==='出庫'&&item.stock<qty) { if(!confirm(`在庫数(${item.stock.toLocaleString()})より多い数量です。続けますか？`)) return; }
  item.stock+=(type==='入庫'?qty:-qty);
  const now=new Date();
  const ts=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  logs.push({ts, name:item.name, type, qty, person, note});
  save(); closeModal('modal-inout');
  if (currentView==='inventory') renderInventory();
  else if (currentView==='order') renderOrder();
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
document.querySelectorAll('.overlay').forEach(el=>{ el.addEventListener('click', e=>{ if(e.target===el) el.classList.remove('active'); }); });

load();
renderInventory();
</script>
</body>
</html>
